# Kit Médico Caseiro — corre no porto 8001.
#   docker compose up -d --build
# Aceder em:  http://<ip-do-pi>:8001
services:
  medkit:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medkit
    restart: unless-stopped
    ports:
      - "8001:8001"
    # Limita os logs do Docker para não encherem o disco do Pi.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
